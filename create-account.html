<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Banking System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">💳 Banking System</h1>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="accounts-list.html">All Accounts</a></li>
                <li><a href="analytics.html">Analytics</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-section">
            <h2>Create a New Account</h2>
            
            <form id="createAccountForm" class="form-box">
                <div class="form-group">
                    <label for="accountNumber">Account Number:</label>
                    <input type="text" id="accountNumber" name="accountNumber" placeholder="e.g., ACC001" required>
                </div>

                <div class="form-group">
                    <label for="ownerName">Owner Name:</label>
                    <input type="text" id="ownerName" name="ownerName" placeholder="Enter full name" required>
                </div>

                <div class="form-group">
                    <label for="accountType">Account Type:</label>
                    <select id="accountType" name="accountType" required>
                        <option value="">Select Account Type</option>
                        <option value="savings">Savings</option>
                        <option value="checking">Checking</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="initialBalance">Initial Balance:</label>
                    <input type="number" id="initialBalance" name="initialBalance" placeholder="0.00" step="0.01" min="0" required>
                </div>

                <button type="submit" class="btn">Create Account</button>
                <a href="index.html" class="btn btn-secondary">Back to Home</a>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Banking System. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('createAccountForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const account = {
                accountNumber: document.getElementById('accountNumber').value,
                ownerName: document.getElementById('ownerName').value,
                accountType: document.getElementById('accountType').value,
                balance: parseFloat(document.getElementById('initialBalance').value),
                transactions: []
            };

            let accounts = JSON.parse(localStorage.getItem('accounts')) || [];
            accounts.push(account);
            localStorage.setItem('accounts', JSON.stringify(accounts));

            const msgDiv = document.getElementById('message');
            msgDiv.textContent = '✓ Account created successfully!';
            msgDiv.classList.add('success');
            
            setTimeout(() => window.location.href = 'index.html', 2000);
        });
    </script>
</body>
</html>
