<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - Banking System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">💳 Banking System</h1>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="accounts-list.html">All Accounts</a></li>
                <li><a href="analytics.html">Analytics</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-section">
            <h2>Withdraw Money</h2>
            
            <form id="withdrawForm" class="form-box">
                <div class="form-group">
                    <label for="withAccountNumber">Account Number:</label>
                    <input type="text" id="withAccountNumber" placeholder="e.g., ACC001" required>
                </div>

                <div class="form-group">
                    <label for="withAmount">Withdrawal Amount:</label>
                    <input type="number" id="withAmount" placeholder="0.00" step="0.01" min="0.01" required>
                </div>

                <button type="submit" class="btn">Withdraw</button>
                <a href="index.html" class="btn btn-secondary">Back to Home</a>
            </form>

            <div id="withMessage" class="message"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Banking System. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('withdrawForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const accountNumber = document.getElementById('withAccountNumber').value;
            const amount = parseFloat(document.getElementById('withAmount').value);
            
            let accounts = JSON.parse(localStorage.getItem('accounts')) || [];
            const account = accounts.find(acc => acc.accountNumber === accountNumber);

            const msgDiv = document.getElementById('withMessage');
            
            if (!account) {
                msgDiv.textContent = '✗ Account not found!';
                msgDiv.classList.add('error');
                msgDiv.classList.remove('success');
                return;
            }

            if (amount <= 0) {
                msgDiv.textContent = '✗ Amount must be positive!';
                msgDiv.classList.add('error');
                msgDiv.classList.remove('success');
                return;
            }

            if (amount > account.balance) {
                msgDiv.textContent = `✗ Insufficient funds! Available balance: $${account.balance.toFixed(2)}`;
                msgDiv.classList.add('error');
                msgDiv.classList.remove('success');
                return;
            }

            account.balance -= amount;
            if (!account.transactions) account.transactions = [];
            account.transactions.push({
                type: 'WITHDRAW',
                amount: amount,
                balance_after: account.balance,
                date: new Date().toISOString()
            });

            localStorage.setItem('accounts', JSON.stringify(accounts));
            
            msgDiv.textContent = `✓ $${amount.toFixed(2)} withdrawn successfully! New balance: $${account.balance.toFixed(2)}`;
            msgDiv.classList.remove('error');
            msgDiv.classList.add('success');
            
            document.getElementById('withdrawForm').reset();
        });
    </script>
</body>
</html>
